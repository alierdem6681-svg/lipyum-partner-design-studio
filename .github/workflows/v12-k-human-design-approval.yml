name: V12-K Human Design Approval

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to approve"
        required: true
        default: "3"
      head_sha:
        description: "Exact PR head SHA shown in the final contact sheet"
        required: true
      approval_phrase:
        description: "Type: APPROVE V12-K2 DESIGN"
        required: true

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  approve:
    name: V12-K Human Design Approval
    runs-on: ubuntu-latest
    environment:
      name: design-approval

    steps:
      - name: Validate exact PR head and approval phrase
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.approval_phrase }}" != "APPROVE V12-K2 DESIGN" ]; then
            echo "Approval phrase mismatch."
            exit 1
          fi

          HEAD_SHA="$(gh pr view "${{ inputs.pr_number }}" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)"
          if [ "$HEAD_SHA" != "${{ inputs.head_sha }}" ]; then
            echo "Input head SHA does not match current PR head."
            echo "PR head: $HEAD_SHA"
            echo "Input: ${{ inputs.head_sha }}"
            exit 1
          fi

      - name: Mark exact SHA as human approved
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ inputs.head_sha }}" \
            -f state=success \
            -f context="V12-K Human Design Approval" \
            -f description="Human design approval recorded for exact PR head" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
