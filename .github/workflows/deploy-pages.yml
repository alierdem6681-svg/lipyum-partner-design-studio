name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Approved PR number to deploy"
        required: true
        default: "3"

permissions:
  contents: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency lock
        run: npm run test:dependency-lock

      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "head_sha=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid --jq .headRefOid)" >> "$GITHUB_OUTPUT"

      - name: Design review gate
        run: npm run test:design-review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}

      - name: Static design contract
        run: npm run test:design-contract

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Install Playwright Chromium
        run: node_modules/node/bin/node node_modules/@playwright/test/cli.js install chromium

      - name: V12-K design gate
        run: npm run test:quality-gate:v12-k

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
