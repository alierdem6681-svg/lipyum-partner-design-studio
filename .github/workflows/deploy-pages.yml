name: GitHub Pages Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main SHA
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: node_modules/node/bin/node node_modules/@playwright/test/cli.js install chromium

      - name: Release quality gate
        run: npm run test:quality-gate:release
        env:
          GITHUB_PAGES: "true"
          LIPYUM_RELEASE_VERSION: "v13-fast-finish"

      - name: Build GitHub Pages artifact
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          LIPYUM_RELEASE_VERSION: "v13-fast-finish"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Validate release metadata
        run: |
          test -f dist/release.json
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('dist/release.json','utf8')); if(r.gitSha !== process.env.GITHUB_SHA) throw new Error('release.json SHA mismatch'); if(r.platform !== 'github-pages') throw new Error('platform mismatch'); if(r.runtime !== 'vue') throw new Error('runtime mismatch');"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
