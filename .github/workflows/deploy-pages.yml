name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Approved PR number to deploy"
        required: true
        default: "3"
      head_sha:
        description: "Exact approved PR head SHA to deploy"
        required: true

permissions:
  contents: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid --jq .headRefOid)"
          if [ "$HEAD_SHA" != "${{ inputs.head_sha }}" ]; then
            echo "Input head SHA does not match current PR head."
            echo "PR head: $HEAD_SHA"
            echo "Input: ${{ inputs.head_sha }}"
            exit 1
          fi
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout approved PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency lock
        run: npm run test:dependency-lock

      - name: Static design contract
        run: npm run test:design-contract

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Install Playwright Chromium
        run: node_modules/node/bin/node node_modules/@playwright/test/cli.js install chromium

      - name: V12-K automated gate
        run: npm run test:quality-gate:release

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
