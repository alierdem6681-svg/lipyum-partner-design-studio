<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" role="img" aria-label="Premium profil önizleme">
  <defs>
    <linearGradient id="previewCrownGradient" x1="16" y1="8" x2="60" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fef3c7" />
      <stop offset="0.48" stop-color="#22c55e" />
      <stop offset="1" stop-color="#047857" />
    </linearGradient>
    <filter id="previewGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.75 0 0 0 0 0.38 0 0 0 0.45 0" />
      <feBlend in="SourceGraphic" />
    </filter>
    <style>
      @keyframes sparkPulse {
        0%, 100% { opacity: .45; transform: scale(.82); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      .spark-one { animation: sparkPulse 1.7s ease-in-out infinite; transform-origin: 18px 16px; }
      .spark-two { animation: sparkPulse 1.7s ease-in-out .42s infinite; transform-origin: 56px 18px; }
    </style>
  </defs>
  <circle cx="36" cy="36" r="30" fill="url(#previewCrownGradient)" filter="url(#previewGlow)" />
  <path d="M21 43h30l3-19-10 7-8-11-8 11-10-7 3 19Z" fill="#fff" opacity=".94" />
  <path d="M23 48h26" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" />
  <circle class="spark-one" cx="18" cy="16" r="2.4" fill="#fff" />
  <circle class="spark-two" cx="56" cy="18" r="2" fill="#fef3c7" />
</svg>
