<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" role="img" aria-label="Premium profil önizleme">
  <defs>
    <radialGradient id="previewAura" cx="35%" cy="22%" r="74%">
      <stop offset="0" stop-color="#dcfce7" />
      <stop offset="0.52" stop-color="#16a34a" />
      <stop offset="1" stop-color="#047857" />
    </radialGradient>
    <linearGradient id="previewCrown" x1="35" y1="24" x2="107" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7cc" />
      <stop offset="0.42" stop-color="#ffffff" />
      <stop offset="1" stop-color="#d1fae5" />
    </linearGradient>
    <linearGradient id="previewCrownShade" x1="38" y1="42" x2="105" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98" />
      <stop offset="1" stop-color="#ecfdf5" stop-opacity=".9" />
    </linearGradient>
    <filter id="previewSoftShadow" x="-32%" y="-32%" width="164%" height="164%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#047857" flood-opacity=".32" />
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#fef3c7" flood-opacity=".45" />
    </filter>
    <style>
      @keyframes premiumSpark {
        0%, 100% { opacity: .42; transform: scale(.82); }
        50% { opacity: 1; transform: scale(1.16); }
      }
      .spark-a,
      .spark-b,
      .spark-c { animation: premiumSpark 1.9s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .spark-b { animation-delay: .38s; }
      .spark-c { animation-delay: .72s; }
    </style>
  </defs>

  <circle cx="72" cy="72" r="62" fill="url(#previewAura)" filter="url(#previewSoftShadow)" />
  <circle cx="72" cy="72" r="55" fill="none" stroke="#bbf7d0" stroke-width="2" opacity=".45" />
  <circle cx="45" cy="37" r="4" fill="#fef3c7" opacity=".95" />
  <circle cx="101" cy="36" r="3.5" fill="#ffffff" opacity=".8" />

  <path
    d="M36 56.5 56.8 69.8 72 39.5l15.2 30.3L108 56.5l-7.2 45.5H43.2L36 56.5Z"
    fill="url(#previewCrown)"
    stroke="#ffffff"
    stroke-width="4"
    stroke-linejoin="round"
  />
  <path
    d="M47.5 96.5h49"
    fill="none"
    stroke="#ffffff"
    stroke-width="9"
    stroke-linecap="round"
  />
  <path
    d="M48.5 86.5h47L99 65.2 85.7 73.7 72 47.1 58.3 73.7 45 65.2l3.5 21.3Z"
    fill="url(#previewCrownShade)"
    opacity=".5"
  />

  <path class="spark-a" d="M28 39h8M32 35v8" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <path class="spark-b" d="M110 45h7M113.5 41.5v7" stroke="#fef3c7" stroke-width="3" stroke-linecap="round" />
  <path class="spark-c" d="M106 105h6M109 102v6" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
</svg>
